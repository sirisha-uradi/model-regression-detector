name: Model Regression Eval

# Run this workflow whenever prompt files change, or manually on demand
on:
  push:
    paths:
      - "prompts/**"
  pull_request:
    paths:
      - "prompts/**"
  workflow_dispatch:

jobs:
  run-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation on v2 prompt
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m src.eval_runner

      - name: Compare against baseline
        run: python -m src.compare_runs

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            data/last_run_results.json
            data/report.html